  </defs>
  <rect width="320" height="100" rx="16" fill="url(#bg)"/>
  <!-- Waveform bars -->
  <rect x="30" y="20" width="4" height="20" rx="2" fill="#6366f1" opacity="0.4"/>
  <rect x="38" y="15" width="4" height="30" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="46" y="22" width="4" height="16" rx="2" fill="#6366f1" opacity="0.4"/>
  <rect x="54" y="12" width="4" height="36" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="62" y="18" width="4" height="24" rx="2" fill="#6366f1" opacity="0.45"/>
  <rect x="70" y="14" width="4" height="32" rx="2" fill="#6366f1" opacity="0.55"/>
  <rect x="78" y="20" width="4" height="20" rx="2" fill="#6366f1" opacity="0.4"/>
  <!-- ZONIK text -->
