<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg5" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg5)"/>
  <!-- 5-bar equalizer that subtly forms Z shape -->
  <!-- Bar heights descend left-right on top, ascend left-right on bottom -->
  <rect x="6" y="5" width="3" height="10" rx="1.5" fill="white" opacity="0.95"/>
  <rect x="11" y="7" width="3" height="7" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="16" y="9" width="3" height="14" rx="1.5" fill="white" opacity="0.75"/>
  <rect x="21" y="18" width="3" height="7" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="26" y="17" width="3" height="10" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Connecting diagonal line -->
  <line x1="8" y1="15" x2="27" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
