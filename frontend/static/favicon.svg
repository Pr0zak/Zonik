<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Z formed by audio waveform bars -->
  <!-- Top bar of Z -->
  <rect x="7" y="7" width="2.5" height="5" rx="1.25" fill="url(#wave)" opacity="0.9"/>
  <rect x="11" y="5.5" width="2.5" height="8" rx="1.25" fill="url(#wave)"/>
  <rect x="15" y="7" width="2.5" height="5" rx="1.25" fill="url(#wave)" opacity="0.9"/>
  <rect x="19" y="6" width="2.5" height="7" rx="1.25" fill="url(#wave)"/>
  <rect x="23" y="7.5" width="2.5" height="4" rx="1.25" fill="url(#wave)" opacity="0.85"/>
  <!-- Diagonal of Z -->
  <rect x="19.5" y="12" width="2.5" height="4.5" rx="1.25" fill="url(#wave)" opacity="0.7"/>
  <rect x="15" y="14" width="2.5" height="4" rx="1.25" fill="url(#wave)" opacity="0.6"/>
  <rect x="10.5" y="15.5" width="2.5" height="4.5" rx="1.25" fill="url(#wave)" opacity="0.7"/>
  <!-- Bottom bar of Z -->
  <rect x="7" y="20.5" width="2.5" height="4.5" rx="1.25" fill="url(#wave)" opacity="0.85"/>
  <rect x="11" y="19" width="2.5" height="7.5" rx="1.25" fill="url(#wave)"/>
  <rect x="15" y="20" width="2.5" height="5.5" rx="1.25" fill="url(#wave)" opacity="0.9"/>
  <rect x="19" y="19.5" width="2.5" height="6.5" rx="1.25" fill="url(#wave)"/>
  <rect x="23" y="21" width="2.5" height="4" rx="1.25" fill="url(#wave)" opacity="0.85"/>
</svg>
